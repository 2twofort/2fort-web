<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2Fort Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0f0b05;
    --surface: #181008;
    --panel:   #1c1208;
    --border:  #3a2210;
    --hover:   #271808;
    --accent:  #c87d2f;
    --gold:    #e8a84a;
    --text:    #f0dfc0;
    --muted:   #7a5535;
    --green:   #5a9e5a;
    --red:     #c0392b;
    --line-hl: rgba(200,125,47,0.06);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 14px;
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .logo-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    margin: 0 2px;
  }

  .file-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .file-label span {
    color: var(--text);
  }

  .spacer { flex: 1; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0b05;
  }

  .btn-primary:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: #0f0b05;
  }

  /* ── Main layout ─────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Editor pane ─────────────────────────────────────── */
  #editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
    min-width: 0;
  }

  .pane-header {
    height: 34px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }

  .pane-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .pane-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
  }

  /* Editor wrapper with line numbers */
  #editor-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  #line-numbers {
    width: 48px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 14px 0;
    overflow: hidden;
    flex-shrink: 0;
    user-select: none;
    text-align: right;
  }

  .ln {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--border);
    padding: 0 10px 0 6px;
    display: block;
    transition: color 0.1s;
  }

  .ln.active { color: var(--accent); }

  #code-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 14px 16px;
    resize: none;
    overflow-y: auto;
    white-space: pre;
    overflow-wrap: normal;
    tab-size: 2;
    caret-color: var(--accent);
    spellcheck: false;
  }

  #code-input::selection {
    background: rgba(200,125,47,0.25);
  }

  #code-input::-webkit-scrollbar { width: 6px; height: 6px; }
  #code-input::-webkit-scrollbar-track { background: transparent; }
  #code-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Preview pane ────────────────────────────────────── */
  #preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  #preview-frame {
    flex: 1;
    border: none;
    background: #fff;
  }

  /* ── Status bar ──────────────────────────────────────── */
  #statusbar {
    height: 26px;
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 16px;
    flex-shrink: 0;
  }

  .status-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: #0f0b05;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Resize handle ───────────────────────────────────── */
  #resize-handle {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
    z-index: 5;
  }

  #resize-handle:hover { background: var(--accent); }

  /* ── Scrollbar sync ──────────────────────────────────── */
  #editor-wrap { overflow: hidden; }

  /* ── Grid texture ────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,125,47,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,125,47,0.02) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  header, main, #statusbar { position: relative; z-index: 1; }
</style>
</head>

<main>
  <div id="editor-pane">
    <div class="pane-header">
      <span class="pane-title">HTML</span>
      <span class="pane-badge" id="cursor-pos">Ln 1, Col 1</span>
    </div>
    <div id="editor-wrap">
      <div id="line-numbers"></div>
      <textarea id="code-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>

<div id="statusbar">
  <div class="status-item">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
    LIVE
  </div>
  <div class="status-item" id="status-chars">0 chars</div>
  <div class="status-item" id="status-lines">1 line</div>
  <div class="status-item" style="margin-left:auto;">HTML · UTF-8</div>
</div>

<script>
const editor   = document.getElementById('code-input');
const frame    = document.getElementById('preview-frame');
const lineNums = document.getElementById('line-numbers');

// ── Default content ───────────────────────────────────────────────────────────
const DEFAULT = `<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Page</title>
  <style>
    body {
      font-family: sans-serif;
      background: #1a1008;
      color: #f0dfc0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { color: #c87d2f; }
  </style>
</head>
<body>
  <h1>Hello from 2Fort Editor!</h1>
</body>
</html>`;

editor.value = DEFAULT;

// ── Live preview ──────────────────────────────────────────────────────────────
let previewTimer = null;

updateAll();

function updatePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(editor.value);
    doc.close();
  }, 300);
}

// ── Line numbers ──────────────────────────────────────────────────────────────
function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  const current = lineNums.children.length;

  if (lines > current) {
    for (let i = current + 1; i <= lines; i++) {
      const span = document.createElement('span');
      span.className = 'ln';
      span.textContent = i;
      lineNums.appendChild(span);
    }
  } else if (lines < current) {
    while (lineNums.children.length > lines) lineNums.removeChild(lineNums.lastChild);
  }
}

// ── Cursor position ───────────────────────────────────────────────────────────
function updateCursor() {
  const val  = editor.value;
  const pos  = editor.selectionStart;
  const lines = val.substring(0, pos).split('\n');
  const ln   = lines.length;
  const col  = lines[lines.length - 1].length + 1;
  document.getElementById('cursor-pos').textContent = `Ln ${ln}, Col ${col}`;

  // Highlight active line number
  document.querySelectorAll('.ln').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === ln);
  });
}

// ── Status bar ────────────────────────────────────────────────────────────────
function updateStatus() {
  const chars = editor.value.length;
  const lines = editor.value.split('\n').length;
  document.getElementById('status-chars').textContent = `${chars.toLocaleString()} chars`;
  document.getElementById('status-lines').textContent = `${lines} line${lines !== 1 ? 's' : ''}`;
}

// ── Sync scroll between editor and line numbers ───────────────────────────────
editor.addEventListener('scroll', () => {
  lineNums.scrollTop = editor.scrollTop;
});

// ── Tab key ───────────────────────────────────────────────────────────────────
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end   = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    updateAll();
  }
});

// ── Main update ───────────────────────────────────────────────────────────────
function updateAll() {
  updateLineNumbers();
  updateCursor();
  updateStatus();
  updatePreview();
}

editor.addEventListener('input',   updateAll);
editor.addEventListener('keyup',   updateCursor);
editor.addEventListener('click',   updateCursor);
editor.addEventListener('selectionchange', updateCursor);

// ── Actions ───────────────────────────────────────────────────────────────────
function clearEditor() {
  if (editor.value && !confirm('Clear the editor?')) return;
  editor.value = '';
  updateAll();
}

async function copyCode() {
  await navigator.clipboard.writeText(editor.value);
  const btn = document.getElementById('copy-label');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 2000);
}

function downloadFile() {
  const name = document.getElementById('filename-display').textContent;
  const blob = new Blob([editor.value], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Filename click to rename ──────────────────────────────────────────────────
document.getElementById('filename-display').addEventListener('click', () => {
  const name = prompt('File name:', document.getElementById('filename-display').textContent);
  if (name) document.getElementById('filename-display').textContent = name.endsWith('.html') ? name : name + '.html';
});

// ── Resizable split ───────────────────────────────────────────────────────────
const handle      = document.getElementById('resize-handle');
const editorPane  = document.getElementById('editor-pane');
const previewPane = document.getElementById('preview-pane');
let   dragging    = false;

handle.addEventListener('mousedown', (e) => {
  dragging = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const main   = document.querySelector('main');
  const rect   = main.getBoundingClientRect();
  const offset = e.clientX - rect.left;
  const total  = rect.width - 4;
  const pct    = Math.min(Math.max(offset / total * 100, 20), 80);
  editorPane.style.flex  = 'none';
  editorPane.style.width = pct + '%';
  previewPane.style.flex = '1';
});

document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});
</script>
